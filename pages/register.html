<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Initiation | DojoX</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥋</text></svg>">

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/toast.css">

    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            padding: 40px 20px;
        }

        .auth-card {
            background: var(--bg-card);
            padding: 50px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .auth-form {
            text-align: left;
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 15px;
            background: var(--bg-input);
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            transition: var(--transition-fast);
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary-red);
            outline: none;
            background: #333;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.2rem;
            user-select: none;
        }

        .toggle-password:hover {
            color: var(--primary-red);
        }

        .social-login {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition-fast);
        }

        .social-btn:hover {
            background: #222;
            border-color: #444;
        }

        .auth-card h1 {
            font-size: 2.25rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #333;
            margin: 0 10px;
        }
    </style>
</head>

<body class="auth-page">

    <div class="auth-card">
        <a href="../index.html" class="header__logo" style="font-size: 2.5rem; margin-bottom: 20px;">DOJO<span>X</span></a>
        <h1>JOIN THE ACADEMY</h1>
        <p style="color: var(--text-secondary);">Start your journey to mastery today.</p>

        <form class="auth-form"
            onsubmit="window.location.href='dashboard-student.html?msg=register_success'; return false;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="Musashi" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Miyamoto" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="ronin@dojox.com" required>
            </div>
            <div class="form-group">
                <label>Primary Track</label>
                <select>
                    <option>BJJ / Grappling</option>
                    <option>Muay Thai / Striking</option>
                    <option>MMA Combine</option>
                    <option>Youth Leadership</option>
                </select>
            </div>
            <div class="form-group">
                <label>Create Secret Key</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
            </div>

            <button class="btn btn--primary" style="width: 100%; margin-top: 10px;">SIGN UP</button>
        </form>

        <div class="divider">OR REGISTER WITH</div>

        <div class="social-login">
            <button class="social-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.26.81-.58z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
            <button class="social-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.11.8 1.12-.1 2.24-.86 3.67-.74 1.76.15 3.01.83 3.86 2.2-3.62 2.11-3.05 6.64.49 8.23-.74 1.76-1.57 3.49-3.13 4.48zM12.03 7.25c-.07-2.93 2.44-5.41 5.31-5.5 1.34 3.75-2.13 5.48-5.31 5.5z"/>
                </svg>
                Apple
            </button>
        </div>

        <p style="margin-top: 30px; color: var(--text-muted);">
            Already initiated? <a href="login.html" style="color: var(--primary-red); font-weight: 600;">Sign In</a>
        </p>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.textContent = '🔒';
            } else {
                pwd.type = 'password';
                icon.textContent = '👁️';
            }
        }
    </script>
    <script src="../assets/js/main.js"></script>
</body>

</html>
