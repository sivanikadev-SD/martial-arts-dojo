<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Entry | DojoX</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥋</text></svg>">

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/toast.css">

    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-card);
            padding: 50px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .auth-form {
            text-align: left;
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: var(--primary-red);
            outline: none;
        }

        .auth-card h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
    </style>
</head>

<body class="auth-page">

    <div class="auth-card">
        <a href="../index.html" class="header__logo" style="font-size: 2.5rem; margin-bottom: 20px;">DOJO<span>X</span></a>
        <h1>WELCOME BACK</h1>
        <p style="color: var(--text-secondary);">Enter your credentials to enter the arena.</p>

        <form class="auth-form"
            onsubmit="window.location.href='dashboard-student.html?msg=login_success'; return false;">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="warrior@dojox.com" required>
            </div>
            <div class="form-group">
                <label>Secret Key</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button class="btn btn--primary" style="width: 100%; margin-top: 10px;">SIGN IN</button>
        </form>

        <p style="margin-top: 30px; color: var(--text-muted);">
            New here? <a href="register.html" style="color: var(--accent-gold);">Create Account</a>
        </p>
    </div>

    <script src="../assets/js/main.js"></script>
</body>

</html>
