<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Student Dashboard</title>

    <!-- Fonts & Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>

<body>

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header flex items-center gap-sm">
                <i class="fas fa-fist-raised fa-2x" style="color: var(--primary-color);"></i>
                <span style="font-family: var(--font-heading); font-weight: 800; font-size: 1.5rem;">DOJO</span>
            </div>

            <div class="sidebar-menu">
                <a href="dashboard-student.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="dashboard-student-schedule.html" class="menu-item"><i class="fas fa-calendar-alt"></i> My
                    Schedule</a>
                <a href="dashboard-student-progress.html" class="menu-item"><i class="fas fa-award"></i> Progress</a>
                <a href="dashboard-student-payment.html" class="menu-item"><i class="fas fa-credit-card"></i>
                    Payments</a>
                <a href="dashboard-student-profile.html" class="menu-item active"><i class="fas fa-user-cog"></i>
                    Profile</a>
            </div>

            <div style="padding: var(--spacing-lg);">
                <a href="#" class="btn btn-outline logout-btn"
                    style="width: 100%; border-color: rgba(255,255,255,0.2); color: white;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <button class="mobile-menu-btn" onclick="toggleSidebar()"
                    style="display: block; color: var(--text-main);">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="flex items-center gap-md">
                    <button class="btn btn-outline theme-toggle-btn"><i class="fas fa-moon"></i></button>
                    <button class="btn btn-outline rtl-toggle-btn"><span
                            style="font-weight: bold; font-size: 0.8rem;">RTL</span></button>
                    <div class="flex items-center gap-sm">
                        <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80"
                            style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;" alt="Profile">
                        <span style="font-weight: 600;">Alex Student</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-container">
                <h2 class="mb-lg">My Profile</h2>

                <div class="grid grid-2 gap-lg" style="grid-template-columns: 1fr 2fr;">

                    <div class="card" style="text-align: center;">
                        <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80"
                            style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 20px;"
                            alt="Profile">
                        <h3 class="mb-xs">Alex Student</h3>
                        <p class="text-muted mb-md">White Belt • Adult BJJ</p>
                        <button class="btn btn-outline mb-sm w-full"
                            style="width: 100%; justify-content: center;">Change Photo</button>
                        <div class="text-left mt-lg">
                            <div class="mb-sm"><strong style="font-weight: 600;">Member Since:</strong> Jan 2024</div>
                            <div class="mb-sm"><strong style="font-weight: 600;">Dojo ID:</strong> 8839201</div>
                            <div><strong style="font-weight: 600;">Status:</strong> <span
                                    style="color: #2ed573;">Active</span></div>
                        </div>
                    </div>

                    <div class="card">
                        <h3 class="mb-md">Personal Information</h3>
                        <form onsubmit="event.preventDefault(); alert('Profile Updated!');">
                            <div class="grid grid-2 gap-md mb-md">
                                <div>
                                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">First
                                        Name</label>
                                    <input type="text" value="Alex"
                                        style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: var(--text-main);">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Last
                                        Name</label>
                                    <input type="text" value="Student"
                                        style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: var(--text-main);">
                                </div>
                            </div>

                            <div class="mb-md">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email
                                    Address</label>
                                <input type="email" value="alex.student@example.com"
                                    style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: var(--text-main);">
                            </div>

                            <div class="mb-md">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Phone
                                    Number</label>
                                <input type="tel" value="(555) 123-4567"
                                    style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: var(--text-main);">
                            </div>

                            <h4 class="mt-lg mb-md">Emergency Contact</h4>
                            <div class="grid grid-2 gap-md mb-md">
                                <div>
                                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Contact
                                        Name</label>
                                    <input type="text" value="Jane Student"
                                        style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: var(--text-main);">
                                </div>
                                <div>
                                    <label
                                        style="display: block; margin-bottom: 8px; font-weight: 500;">Relationship</label>
                                    <input type="text" value="Mother"
                                        style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: var(--text-main);">
                                </div>
                            </div>
                            <div class="mb-md">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Emergency
                                    Phone</label>
                                <input type="tel" value="(555) 987-6543"
                                    style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: var(--text-main);">
                            </div>

                            <div class="text-right mt-lg">
                                <button class="btn btn-primary">Save Changes</button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </main>

        <!-- Mobile Sidebar Overlay -->
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/main.js"></script>
    <script>
        // Simple Sidebar Toggle Logic for Dashboard
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>
</body>

</html>
